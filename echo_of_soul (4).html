<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сэтгэлийн цуурай</title>
  <style>
    :root {
      --bg: #dfe8e3;
      --card: #f3f5f2;
      --text: #263331;
      --muted: #73817b;
      --accent1: #7fb5ad;
      --accent2: #8ec0b7;
      --soft-accent: #dde4de;
      --line: rgba(38, 51, 49, 0.08);
      --shadow: 0 20px 45px rgba(77, 98, 90, 0.12);
      --radius: 34px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #dfe8e3 0%, #d7e2dc 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 30px 36px;
      text-align: center;
    }

    /* Circular logo wrap */
    .cloud-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 26px;
      background: linear-gradient(135deg, #8bbab6, #93c7c0);
      box-shadow: 0 10px 24px rgba(105, 148, 138, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cloud-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.1;
      color: #263331;
    }

    .intro-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 18px auto 34px;
      justify-content: center;
    }

    .intro {
      margin: 0;
      font-size: 19px;
      line-height: 1.65;
      color: #6f7c76;
    }

    .question {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 700;
      color: #2f3b39;
    }

    .score-value {
      font-size: 64px;
      font-weight: 700;
      color: #567a73;
      margin: 8px 0 18px;
    }

    .slider-wrap {
      padding: 8px 0 10px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      background: #d4d9d4;
      border-radius: 999px;
    }

    input[type="range"]::-moz-range-track {
      height: 10px;
      background: #d4d9d4;
      border-radius: 999px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #222;
      border-radius: 2px;
      margin-top: -4px;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #222;
      border-radius: 2px;
      border: none;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .main-btn,
    .info-btn {
      border: none;
      border-radius: 20px;
      min-height: 62px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      box-shadow: 0 12px 22px rgba(95, 124, 114, 0.10);
    }

    .main-btn:hover,
    .info-btn:hover {
      transform: translateY(-2px);
    }

    .main-btn {
      flex: 1 1 340px;
      background: linear-gradient(90deg, #7fb5ad, #95c1ba);
      color: white;
      padding: 0 24px;
    }

    /* Info button: circle with ⓘ icon style */
    .info-btn {
      flex: 0 0 32px;
      width: 32px;
      min-height: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--soft-accent);
      color: #50655e;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      font-family: serif;
      line-height: 1;
      box-shadow: none;
    }

    .hint {
      margin: 18px auto 0;
      color: #7a867f;
      font-size: 14px;
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(55, 73, 67, 0.24);
      padding: 18px;
      z-index: 999;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: min(680px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #f4f6f3;
      border-radius: 28px;
      box-shadow: 0 24px 50px rgba(65, 83, 76, 0.14);
      padding: 28px;
      text-align: left;
      animation: fadeUp 0.24s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title {
      margin: 0;
      font-size: 28px;
      color: #2e3b39;
    }

    .close-btn {
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #e1e7e2;
      color: #50655e;
      font-size: 22px;
      cursor: pointer;
    }

    .modal-quote {
      margin: 0 0 14px;
      font-size: 24px;
      line-height: 1.6;
      font-weight: 700;
      color: #2d3937;
    }

    .modal-desc, .modal-content p, .modal-content li {
      font-size: 15px;
      color: #6f7c76;
      line-height: 1.8;
    }

    .info-cards {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .mini-card {
      background: #f7f8f6;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }

    .mini-card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #2f3b39;
    }

    .mini-card p,
    .mini-card ul {
      margin: 0;
      color: #73817b;
      font-size: 15px;
      line-height: 1.8;
    }

    .mini-card ul {
      padding-left: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 16px;
      background: #f7f8f6;
    }

    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid rgba(38, 51, 49, 0.08);
      vertical-align: top;
      font-size: 14px;
      color: #6e7b75;
      line-height: 1.7;
    }

    th {
      background: #e3e8e4;
      color: #536760;
      font-size: 13px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .info-switch {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .small-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: #dde4de;
      color: #556962;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 680px) {
      .app {
        padding: 28px 18px 24px;
      }

      .intro {
        font-size: 17px;
      }

      .question {
        font-size: 20px;
      }

      .score-value {
        font-size: 52px;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .info-btn {
        align-self: center;
      }
    }
  </style>
</head>

        desc: "Сайн байгаа үедээ өөрийгөө магтах хэрэгтэй. Чиний тогтвортой байдал үнэтэй. Энэ мэдрэмжийг мартахгүй байхын тулд өнөөдрийн хамгийн гоё агшнаа тэмдэглээд үлдээгээрэй."
      },
      8: {
        quote: "Чиний доторх хүч өнөөдөр тод мэдрэгдэж байна. Тэр гэрлээ бусдад ч түгээгээрэй.",
        desc: "Эерэг төлөвөө тогтоон барихын тулд өнөөдрийн гоё мөчөө тэмдэглээд үлдээ. Чиний тайван, гэрэлтэй байдал өөрт чинь ч, чиний эргэн тойронд ч нөлөөлж чадна."
      },
      9: {
        quote: "Чи өнөөдөр маш хүчтэй байна. Энэ энергийг зөв зүйлдээ зарцуулаарай.",
        desc: "Өндөр хэмнэлтэй үедээ ч тайван байдлаа хадгалж чадвал илүү тогтвортой сайхан мэдрэмж үлдэнэ. Эрч хүчээ зөв хуваарилбал энэ өдөр илүү утгатай өнгөрнө."
      },
      10: {
        quote: "Өнөөдөр чи бүтэн гэрэл мэт байна. Инээмсэглэл чинь орчныг хүртэл өөрчилж чадна.",
        desc: "Энэ сайхан төлөвөө талархалтайгаар мэдэр. Чиний доторх сайн энерги бол үнэхээр хүчтэй зүйл. Өнөөдрийн энэ гэрэл чамд цаашдын өдрүүдэд ч хүч өгч чадна."
      }
    };

    const scoreValue = document.getElementById('scoreValue');
    const moodSlider = document.getElementById('moodSlider');
    const showMessageBtn = document.getElementById('showMessageBtn');
    const openInfoBtn = document.getElementById('openInfoBtn');
    const quoteModal = document.getElementById('quoteModal');
    const modalQuote = document.getElementById('modalQuote');
    const modalDesc = document.getElementById('modalDesc');
    const closeModal = document.getElementById('closeModal');
    const infoModal = document.getElementById('infoModal');
    const infoTitle = document.getElementById('infoTitle');
    const infoBody = document.getElementById('infoBody');
    const closeInfoModal = document.getElementById('closeInfoModal');

    function toBinary(value) {
      return Number(value).toString(2);
    }

    function syncScore() {
      scoreValue.textContent = moodSlider.value;
    }

    moodSlider.addEventListener('input', syncScore);

    function showResult(score) {
      const binary = toBinary(score);
      const data = messages[score];
      modalQuote.textContent = data.quote;
      modalDesc.textContent = `Таны сонгосон ${score} оноо нь хоёртын тооллоор ${binary} гэж дүрслэгдэнэ. ${data.desc}`;
      quoteModal.classList.add('show');
    }

    showMessageBtn.addEventListener('click', () => {
      showResult(Number(moodSlider.value));
    });

    function openInfoModal(type = 'project') {
      if (type === 'project') {
        infoTitle.textContent = 'Товч мэдээлэл';
        infoBody.innerHTML = `
          <div class="info-cards">
            <div class="mini-card">
              <h3>Төслийн үндсэн санаа</h3>
              <p>
                Энэхүү веб нь хүний сэтгэл зүйн өдөр тутмын байдлыг энгийн аргаар дэмжих зорилготой.
                Хэрэглэгч QR код уншуулан веб рүү орж ирээд тухайн өдрийн мэдрэмжээ 0–10 оноогоор үнэлнэ.
                Систем нь тэр үнэлгээнд тохирсон урам зориг өгөх үг, дэмжих тайлбар, мөн тухайн тооны хоёртын дүрслэлийг хамт харуулна.
              </p>
            </div>
            <div class="mini-card">
              <h3>Хэрэглээний урсгал</h3>
              <ul>
                <li>1. QR код уншуулна</li>
                <li>2. Веб хуудас автоматаар нээгдэнэ</li>
                <li>3. Хэрэглэгч сэтгэлзүйн төлвөө 0–10 хооронд сонгоно</li>
                <li>4. "Оноог оруулах" товч дарна</li>
                <li>5. Тохирсон мессеж болон хоёртын код popup байдлаар харагдана</li>
              </ul>
            </div>
            <div class="mini-card">
              <h3>Төслийн ач холбогдол</h3>
              <p>
                Завгүй амьдралын хэмнэл дунд хэрэглэгчид урт текст уншихгүйгээр богино хугацаанд эерэг нөлөө авах боломжтой.
                Мөн сэтгэл зүй ба мэдээллийн технологийг холбосон тул танин мэдэхүйн болон бүтээлч шийдэл болж өгнө.
              </p>
            </div>
          </div>
        `;
      } else {
        infoTitle.textContent = 'Мэдээллийн хүснэгт';
        infoBody.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Сэдэв</th>
                <th>Тайлбар</th>
                <th>Төслийн хэрэглээ</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><strong>QR код</strong></td>
                <td>QR код нь мэдээллийг хурдан уншуулах зориулалттай хоёр хэмжээст код юм. Гар утасны камераар уншуулж шууд холбоос, мэдээлэл нээдэг.</td>
                <td>Хэрэглэгчийг веб хуудас руу хурдан, нэмэлт алхамгүй оруулна.</td>
              </tr>
              <tr>
                <td><strong>QR кодын гарал үүсэл</strong></td>
                <td>1994 онд Японы Denso Wave компани үйлдвэрлэл, логистикийн зориулалтаар хөгжүүлсэн.</td>
                <td>Өнөөдөр төлбөр, бүртгэл, веб холбоос, ухаалаг мэдээлэл түгээхэд өргөн ашиглагддаг.</td>
              </tr>
              <tr>
                <td><strong>Хоёртын тооллын систем</strong></td>
                <td>0 ба 1 гэсэн хоёр тэмдэгт дээр суурилсан тооллын систем. Компьютер бүх мэдээллийг үндсэндээ ийм бүтэцтэйгээр боловсруулдаг.</td>
                <td>Хэрэглэгчийн сонгосон оноог технологийн хэл рүү хөрвүүлж, сэтгэлзүйн утгатай холбон харуулна.</td>
              </tr>
              <tr>
                <td><strong>Сэтгэлзүйн дэмжлэг</strong></td>
                <td>Оноо бүрт өөр, нөхцөл байдалд тохирсон урам өгөх богино мессеж бэлдсэн.</td>
                <td>Бага хугацаанд эерэг мэдрэмж, анхаарал, дотоод тайвшрал өгөх зорилготой.</td>
              </tr>
              <tr>
                <td><strong>Хүн байхуй төсөлтэй холбоо</strong></td>
                <td>Хүний өдөр тутмын мэдрэмжийг анзаарч, эерэг хандлага түгээх, харилцан дэмжих соёлыг технологиор дамжуулан хэрэгжүүлж байна.</td>
                <td>Ёс зүй, сэтгэлзүй, эерэг нөлөөллийг дижитал шийдэлтэй уялдуулж өгч байна.</td>
              </tr>
            </tbody>
          </table>
        `;
      }
      infoModal.classList.add('show');
    }

    openInfoBtn.addEventListener('click', () => openInfoModal('project'));

    closeModal.addEventListener('click', () => quoteModal.classList.remove('show'));
    closeInfoModal.addEventListener('click', () => infoModal.classList.remove('show'));

    quoteModal.addEventListener('click', (e) => {
      if (e.target === quoteModal) quoteModal.classList.remove('show');
    });

    infoModal.addEventListener('click', (e) => {
      if (e.target === infoModal) infoModal.classList.remove('show');
    });

    syncScore();
  </script>
</body>
</html>
