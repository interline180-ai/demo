<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сэтгэлийн цуурай</title>
  <style>
    :root {
      --bg: #e5e9e6;
      --card: #f9faf9;
      --text: #2c3532;
      --muted: #8a9491;
      --accent: #7fb5ad;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      --radius: 30px;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(450px, 100%);
      background: var(--card);
      padding: 40px 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
    }

    /* Дээд хэсэг: Төслийн нэр болон Мэдээллийн товчлуур */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .project-tag {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .info-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--muted);
      background: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-style: italic;
      font-weight: bold;
      transition: all 0.2s;
    }

    .info-btn:hover {
      background: var(--muted);
      color: white;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 10px 0;
      font-weight: 700;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 40px;
    }

    /* Оноо сонгох хэсэг */
    .score-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 40px;
    }

    .score-btn {
      aspect-ratio: 1;
      border-radius: 18px;
      border: 1px solid #e0eadd;
      background: white;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .score-btn:hover {
      border-color: var(--accent);
      background: #f0f7f5;
    }

    .score-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .main-btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      border: none;
      background: var(--text);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .main-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Модал цонх */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }

    .modal.show { display: flex; }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 25px;
      max-width: 400px;
      width: 100%;
      position: relative;
      text-align: center;
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 13px;
      text-align: left;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="header-row">
      <div class="project-tag">ХҮН БАЙХУЙ ТӨСӨЛ</div>
      <button class="info-btn" id="openInfoBtn">i</button>
    </div>

    <h1>Сэтгэлийн цуурай</h1>
    <p class="subtitle">Өнөөдөр таны сэтгэл санаа ямар байна вэ? (1-10)</p>

    <div class="score-grid" id="scoreGrid">
      </div>

    <button class="main-btn" id="submitBtn" disabled>Илгээх</button>
  </div>

  <div class="modal" id="infoModal">
    <div class="modal-content">
      <span class="close-modal" id="closeInfo">&times;</span>
      <h3>Төслийн тухай</h3>
      <table>
        <tr>
          <td><strong>Зорилго</strong></td>
          <td>Технологиор дамжуулан сэтгэлзүйн дэмжлэг үзүүлэх.</td>
        </tr>
        <tr>
          <td><strong>Холбоос</strong></td>
          <td>Хүн байхуй соёл, эерэг хандлага.</td>
        </tr>
      </table>
    </div>
  </div>

  <div class="modal" id="quoteModal">
    <div class="modal-content">
      <span class="close-modal" id="closeQuote">&times;</span>
      <h2 id="resultEmoji">✨</h2>
      <p id="resultText" style="line-height: 1.6; font-size: 17px;"></p>
    </div>
  </div>

  <script>
    const scoreGrid = document.getElementById('scoreGrid');
    const submitBtn = document.getElementById('submitBtn');
    const quoteModal = document.getElementById('quoteModal');
    const infoModal = document.getElementById('infoModal');
    let selectedScore = null;

    // Сэтгэлзүйн мессежүүд
    const messages = {
      low: "Өөртөө битгий хатуу хандаарай. Үүл бүхний цаана нар байдаг шиг энэ мэдрэмж удахгүй замхарна. Та ганцаараа биш шүү.",
      mid: "Зүгээр л гүнзгий амьсгаа аваарай. Та өнөөдөр чадах бүхнээ хийж байна. Өөрийгөө бага ч болов амрааж, эрч хүч аваарай.",
      high: "Гайхалтай! Таны доторх тэр гэрэл бусдад ч бас дулаан илч түгээж байгаа. Энэ эерэг эрч хүчээ хайрлаж яваарай."
    };

    // Товчлуур үүсгэх
    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement('button');
      btn.className = 'score-btn';
      btn.textContent = i;
      btn.onclick = () => {
        document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedScore = i;
        submitBtn.disabled = false;
      };
      scoreGrid.appendChild(btn);
    }

    submitBtn.onclick = () => {
      let msg = "";
      let emoji = "✨";
      if (selectedScore <= 4) { msg = messages.low; emoji = "🌿"; }
      else if (selectedScore <= 7) { msg = messages.mid; emoji = "☀️"; }
      else { msg = messages.high; emoji = "🌟"; }
      
      document.getElementById('resultText').textContent = msg;
      document.getElementById('resultEmoji').textContent = emoji;
      quoteModal.classList.add('show');
    };

    // Модал хаах функцууд
    document.getElementById('openInfoBtn').onclick = () => infoModal.classList.add('show');
    document.getElementById('closeInfo').onclick = () => infoModal.classList.remove('show');
    document.getElementById('closeQuote').onclick = () => quoteModal.classList.remove('show');
    
    window.onclick = (event) => {
      if (event.target == infoModal) infoModal.classList.remove('show');
      if (event.target == quoteModal) quoteModal.classList.remove('show');
    }
  </script>
</body>
</html>
